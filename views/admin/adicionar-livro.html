<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adicionar Livro - INLIB Admin</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <div class="admin-logo-box">I</div>
        <div class="admin-logo-text">
          <div class="admin-logo-title">INLIB</div>
          <div class="admin-logo-subtitle">Admin</div>
        </div>
      </div>
      <nav class="admin-nav">
        <div class="admin-nav-section">
          <div class="admin-nav-section-title">Principais</div>
          <a href="dashboard.html"><span class="admin-nav-icon">📊</span>Dashboard</a>
        </div>
        <div class="admin-nav-section">
          <div class="admin-nav-section-title">Gestão</div>
          <a href="livros.html"><span class="admin-nav-icon">📚</span>Livros</a>
          <a href="categorias.html"><span class="admin-nav-icon">📁</span>Categorias</a>
          <a href="usuarios.html"><span class="admin-nav-icon">👥</span>Usuários</a>
        </div>
        <div class="admin-nav-section">
          <div class="admin-nav-section-title">Ações</div>
          <a href="adicionar-livro.html" class="active"><span class="admin-nav-icon">➕</span>Novo Livro</a>
        </div>
        <div class="admin-nav-section">
          <div class="admin-nav-section-title">Sistema</div>
          <a href="configuracoes.html"><span class="admin-nav-icon">⚙️</span>Configurações</a>
          <a href="../../views/public/index.html"><span class="admin-nav-icon">👁️</span>Ver Site</a>
        </div>
      </nav>
      <div class="admin-user-section">
        <div class="admin-user-avatar">👨</div>
        <div class="admin-user-info">
          <div class="admin-user-name">João Silva</div>
          <div class="admin-user-role">Administrador</div>
        </div>
      </div>
      <button class="admin-logout" onclick="handleLogout()">🚪 Sair</button>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>Adicionar Novo Livro</h1>
      </div>

      <div class="form-container">
        <form id="book-form" onsubmit="handleBookForm(event)">
          <div class="form-section">
            <h3 class="form-section-title">Informações Básicas</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="title">Título *</label>
                <input type="text" id="title" name="title" required>
              </div>
              <div class="form-group">
                <label for="author">Autor *</label>
                <input type="text" id="author" name="author" required>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="form-section-title">Informações Detalhadas</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="publisher">Editora *</label>
                <input type="text" id="publisher" name="publisher" required>
              </div>
              <div class="form-group">
                <label for="category">Categoria *</label>
                <select id="category" name="category" required>
                  <option value="">Selecione uma categoria</option>
                </select>
              </div>
              <div class="form-group">
                <label for="year">Ano de Publicação *</label>
                <input type="number" id="year" name="year" min="1900" max="2099" required>
              </div>
              <div class="form-group">
                <label for="pages">Número de Páginas *</label>
                <input type="number" id="pages" name="pages" min="1" required>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="form-section-title">Metadados</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="language">Idioma *</label>
                <input type="text" id="language" name="language" placeholder="ex: Português" required>
              </div>
              <div class="form-group">
                <label for="isbn">ISBN</label>
                <input type="text" id="isbn" name="isbn" placeholder="ex: 978-8532530786">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="form-section-title">Descrição</h3>
            <div class="form-group">
              <label for="description">Descrição do Livro *</label>
              <textarea id="description" name="description" required></textarea>
            </div>
          </div>

          <div class="form-section">
            <h3 class="form-section-title">Uploads</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="cover">Capa do Livro</label>
                <input type="file" id="cover" name="cover" accept="image/*">
                <small>PNG, JPG (máx 5MB)</small>
              </div>
              <div class="form-group">
                <label for="pdf">Arquivo PDF</label>
                <input type="file" id="pdf" name="pdf" accept=".pdf">
                <small>PDF (máx 50MB)</small>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="reset" class="btn-admin btn-admin-secondary">Limpar</button>
            <a href="livros.html" class="btn-admin btn-admin-secondary">Cancelar</a>
            <button type="submit" class="btn-admin btn-admin-primary">Adicionar Livro</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="../../assets/js/data.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script>
    function initForm() {
      const categorySelect = document.getElementById('category');
      const categories = getCategories();
      
      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat.name;
        option.textContent = cat.name;
        categorySelect.appendChild(option);
      });
    }

    function handleBookForm(event) {
      event.preventDefault();
      
      if (!validateForm('book-form')) {
        showNotification('Por favor, preencha todos os campos obrigatórios', 'error');
        return;
      }

      const formData = {
        title: document.getElementById('title').value,
        author: document.getElementById('author').value,
        publisher: document.getElementById('publisher').value,
        category: document.getElementById('category').value,
        year: document.getElementById('year').value,
        pages: document.getElementById('pages').value,
        language: document.getElementById('language').value,
        isbn: document.getElementById('isbn').value,
        description: document.getElementById('description').value
      };

      showNotification('Livro adicionado com sucesso!', 'success');
      setTimeout(() => {
        window.location.href = 'livros.html';
      }, 1500);
    }

    function handleLogout() {
      if (confirm('Tem certeza que deseja sair?')) {
        removeStorage('loggedIn');
        removeStorage('user');
        window.location.href = '../../views/public/index.html';
      }
    }

    initForm();
  </script>
</body>
</html>
