<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Livro - INLIB Admin</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo"><div class="admin-logo-box">I</div><div class="admin-logo-text"><div class="admin-logo-title">INLIB</div><div class="admin-logo-subtitle">Admin</div></div></div>
      <nav class="admin-nav">
        <div class="admin-nav-section"><div class="admin-nav-section-title">Principais</div><a href="dashboard.html"><span class="admin-nav-icon">📊</span>Dashboard</a></div>
        <div class="admin-nav-section"><div class="admin-nav-section-title">Gestão</div><a href="livros.html"><span class="admin-nav-icon">📚</span>Livros</a><a href="categorias.html"><span class="admin-nav-icon">📁</span>Categorias</a><a href="usuarios.html"><span class="admin-nav-icon">👥</span>Usuários</a></div>
        <div class="admin-nav-section"><div class="admin-nav-section-title">Ações</div><a href="adicionar-livro.html"><span class="admin-nav-icon">➕</span>Novo Livro</a></div>
        <div class="admin-nav-section"><div class="admin-nav-section-title">Sistema</div><a href="configuracoes.html"><span class="admin-nav-icon">⚙️</span>Configurações</a><a href="../../views/public/index.html"><span class="admin-nav-icon">👁️</span>Ver Site</a></div>
      </nav>
      <div class="admin-user-section"><div class="admin-user-avatar">👨</div><div class="admin-user-info"><div class="admin-user-name">João Silva</div><div class="admin-user-role">Administrador</div></div></div>
      <button class="admin-logout" onclick="handleLogout()">🚪 Sair</button>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>Editar Livro</h1>
      </div>

      <div class="form-container">
        <form id="book-form" onsubmit="handleBookForm(event)">
          <div class="form-section">
            <h3 class="form-section-title">Informações Básicas</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="title">Título *</label>
                <input type="text" id="title" name="title" required>
              </div>
              <div class="form-group">
                <label for="author">Autor *</label>
                <input type="text" id="author" name="author" required>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="form-section-title">Informações Detalhadas</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="publisher">Editora *</label>
                <input type="text" id="publisher" name="publisher" required>
              </div>
              <div class="form-group">
                <label for="category">Categoria *</label>
                <select id="category" name="category" required></select>
              </div>
              <div class="form-group">
                <label for="year">Ano de Publicação *</label>
                <input type="number" id="year" name="year" min="1900" max="2099" required>
              </div>
              <div class="form-group">
                <label for="pages">Número de Páginas *</label>
                <input type="number" id="pages" name="pages" min="1" required>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="form-section-title">Metadados</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="language">Idioma *</label>
                <input type="text" id="language" name="language" required>
              </div>
              <div class="form-group">
                <label for="isbn">ISBN</label>
                <input type="text" id="isbn" name="isbn">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="form-section-title">Descrição</h3>
            <div class="form-group">
              <label for="description">Descrição do Livro *</label>
              <textarea id="description" name="description" required></textarea>
            </div>
          </div>

          <div class="form-actions">
            <a href="livros.html" class="btn-admin btn-admin-secondary">Cancelar</a>
            <button type="submit" class="btn-admin btn-admin-primary">Salvar Alterações</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="../../assets/js/data.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script>
    function initForm() {
      const bookId = parseInt(getUrlParameter('id'));
      if (!bookId) {
        window.location.href = 'livros.html';
        return;
      }

      const book = getBook(bookId);
      if (!book) {
        window.location.href = 'livros.html';
        return;
      }

      const categorySelect = document.getElementById('category');
      const categories = getCategories();
      
      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat.name;
        option.textContent = cat.name;
        option.selected = cat.name === book.category;
        categorySelect.appendChild(option);
      });

      document.getElementById('title').value = book.title;
      document.getElementById('author').value = book.author;
      document.getElementById('publisher').value = book.publisher;
      document.getElementById('year').value = book.year;
      document.getElementById('pages').value = book.pages;
      document.getElementById('language').value = book.language;
      document.getElementById('isbn').value = book.isbn;
      document.getElementById('description').value = book.description;
    }

    function handleBookForm(event) {
      event.preventDefault();
      if (!validateForm('book-form')) {
        showNotification('Por favor, preencha todos os campos', 'error');
        return;
      }
      showNotification('Livro atualizado com sucesso!', 'success');
      setTimeout(() => { window.location.href = 'livros.html'; }, 1500);
    }

    function handleLogout() { if (confirm('Sair?')) { removeStorage('loggedIn'); window.location.href = '../../views/public/index.html'; } }

    initForm();
  </script>
</body>
</html>
