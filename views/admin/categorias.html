<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias - INLIB Admin</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <div class="admin-logo-box">I</div>
        <div class="admin-logo-text"><div class="admin-logo-title">INLIB</div><div class="admin-logo-subtitle">Admin</div></div>
      </div>
      <nav class="admin-nav">
        <div class="admin-nav-section"><div class="admin-nav-section-title">Principais</div><a href="dashboard.html"><span class="admin-nav-icon">📊</span>Dashboard</a></div>
        <div class="admin-nav-section"><div class="admin-nav-section-title">Gestão</div><a href="livros.html"><span class="admin-nav-icon">📚</span>Livros</a><a href="categorias.html" class="active"><span class="admin-nav-icon">📁</span>Categorias</a><a href="usuarios.html"><span class="admin-nav-icon">👥</span>Usuários</a></div>
        <div class="admin-nav-section"><div class="admin-nav-section-title">Ações</div><a href="adicionar-livro.html"><span class="admin-nav-icon">➕</span>Novo Livro</a></div>
        <div class="admin-nav-section"><div class="admin-nav-section-title">Sistema</div><a href="configuracoes.html"><span class="admin-nav-icon">⚙️</span>Configurações</a><a href="../../views/public/index.html"><span class="admin-nav-icon">👁️</span>Ver Site</a></div>
      </nav>
      <div class="admin-user-section"><div class="admin-user-avatar">👨</div><div class="admin-user-info"><div class="admin-user-name">João Silva</div><div class="admin-user-role">Administrador</div></div></div>
      <button class="admin-logout" onclick="handleLogout()">🚪 Sair</button>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>Gestão de Categorias</h1>
        <button class="btn-admin btn-admin-primary" onclick="showAddCategoryForm()">➕ Nova Categoria</button>
      </div>

      <div id="category-form" style="display: none; margin-bottom: 2rem;">
        <div class="form-container">
          <h3 class="form-title">Adicionar Categoria</h3>
          <div class="form-group">
            <label for="cat-name">Nome da Categoria</label>
            <input type="text" id="cat-name" placeholder="Digite o nome">
          </div>
          <div class="form-group">
            <label for="cat-icon">Ícone (emoji)</label>
            <input type="text" id="cat-icon" placeholder="ex: 📚" maxlength="2">
          </div>
          <div class="form-actions">
            <button class="btn-admin btn-admin-secondary" onclick="hideAddCategoryForm()">Cancelar</button>
            <button class="btn-admin btn-admin-primary" onclick="addCategory()">Adicionar</button>
          </div>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr><th>Ícone</th><th>Nome</th><th>Livros</th><th>Ações</th></tr>
          </thead>
          <tbody id="categories-table"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../../assets/js/data.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script>
    function loadCategories() {
      const categories = getCategories();
      const tbody = document.getElementById('categories-table');
      tbody.innerHTML = categories.map(cat => `
        <tr>
          <td style="font-size: 1.5rem;">${cat.icon}</td>
          <td><strong>${cat.name}</strong></td>
          <td>${cat.count}</td>
          <td>
            <div class="table-actions">
              <button class="table-action-btn action-edit" onclick="editCategory(${cat.id})">Editar</button>
              <button class="table-action-btn action-delete" onclick="deleteCategory(${cat.id})">Excluir</button>
            </div>
          </td>
        </tr>
      `).join('');
    }
    function showAddCategoryForm() { document.getElementById('category-form').style.display = 'block'; }
    function hideAddCategoryForm() { document.getElementById('category-form').style.display = 'none'; }
    function addCategory() {
      const name = document.getElementById('cat-name').value;
      const icon = document.getElementById('cat-icon').value;
      if (name && icon) {
        showNotification('Categoria adicionada com sucesso!', 'success');
        hideAddCategoryForm();
      } else {
        showNotification('Preencha todos os campos', 'error');
      }
    }
    function editCategory(id) { showNotification('Editar categoria (simulado)', 'info'); }
    function deleteCategory(id) { confirmAction('Excluir esta categoria?', () => { showNotification('Categoria excluída', 'success'); loadCategories(); }); }
    function handleLogout() { if (confirm('Sair?')) { removeStorage('loggedIn'); window.location.href = '../../views/public/index.html'; } }
    loadCategories();
  </script>
</body>
</html>
